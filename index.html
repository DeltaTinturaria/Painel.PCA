function stPeca(p,ref,parc){
  if(parc)return{l:"Hoje",c:"#185FA5",bg:"#E6F1FB"};
  if(!ref||!p)return null;
  const r=p/ref;
  if(r>=1.05)return{l:"Acima",c:"#3B6D11",bg:"#EAF3DE"};
  if(r>=0.85)return{l:"Na média",c:"#854F0B",bg:"#FAEEDA"};
  return{l:"Abaixo",c:"#A32D2D",bg:"#FCEBEB"};
}

function Pill({l,bg,c}){return h("span",{style:{fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:20,background:bg,color:c,whiteSpace:"nowrap"}},l)}
function Trend({v,r}){
  if(!r||!v)return null;
  const d=pct(v,r),up=d>0,neu=Math.abs(d)<2;
  const col=neu?"#185FA5":up?"#3B6D11":"#A32D2D";
  return h("span",{style:{fontSize:11,fontWeight:500,color:col}},(up&&!neu?"↑":(!up&&!neu?"↓":"−"))+" "+(d>0?"+":"")+d.toFixed(1)+"%")
}
function KCard({lbl,val,unit,sub,tv,tr,acc}){

    tv!==undefined&&h("div",{style:{marginTop:4}},h(Trend,{v:tv,r:tr}))
  )
}

function ChartDias({dias,mm,mh}){
  if(!dias?.length)return h("div",{style:{textAlign:"center",padding:"2rem",color:"var(--txt3)",fontSize:13,border:"0.5px dashed var(--bdr1)",borderRadius:10}},"Detalhamento diário não disponível");
  const W=560,H=200,PL=36,PB=32,PT=24,PR=12,iW=W-PL-PR,iH=H-PB-PT;
  const mx=Math.max(...dias.map(d=>d.pecas),(mm||0)*1.4,(mh||0)*1.4,10);
  const bW=Math.max(Math.floor(iW/dias.length)-6,10);
  const ys=v=>PT+iH-(v/mx)*iH,xp=i=>PL+(i+.5)*(iW/dias.length);
  return h("svg",{viewBox:`0 0 ${W} ${H}`,width:"100%",style:{overflow:"visible"}},
    [0,Math.round(mx*.5),Math.round(mx)].map(v=>[
      h("line",{key:"l"+v,x1:PL,x2:W-PR,y1:ys(v),y2:ys(v),stroke:"var(--bdr1)",strokeWidth:.5}),
      h("text",{key:"t"+v,x:PL-5,y:ys(v)+4,textAnchor:"end",fontSize:9,fill:"var(--txt3)"},v)
    ]),
    mh>0&&[h("line",{key:"lh",x1:PL,x2:W-PR,y1:ys(mh),y2:ys(mh),stroke:"#639922",strokeWidth:1.5,strokeDasharray:"4,3"}),h("text",{key:"th",x:W-PR-2,y:ys(mh)-5,textAnchor:"end",fontSize:9,fill:"#639922"},"hist "+nf(mh,0))],
    mm>0&&[h("line",{key:"lm",x1:PL,x2:W-PR,y1:ys(mm),y2:ys(mm),stroke:"#BA7517",strokeWidth:1.5,strokeDasharray:"5,3"}),h("text",{key:"tm",x:PL+4,y:ys(mm)-5,textAnchor:"start",fontSize:9,fill:"#BA7517"},"mês "+nf(mm,0))],
    ...dias.map((d,i)=>{

      const col=d.parcial?"rgba(24,95,165,.5)":st?.l==="Acima"?"#639922":st?.l==="Abaixo"?"#E24B4A":"#BA7517";

function TabMes({D}){

function TabIA({D}){

  function exJSON(txt){
    const m1=txt.match(/```json\s*([\s\S]*?)```/);if(m1){try{return JSON.parse(m1[1].trim());}catch{}}
    const m2=txt.match(/```\s*([\s\S]*?)```/);if(m2){try{return JSON.parse(m2[1].trim());}catch{}}
    const s=txt.indexOf("{");if(s>=0){let d=0,e=-1;for(let i=s;i<txt.length;i++){if(txt[i]==="{")d++;else if(txt[i]==="}"){d--;if(!d){e=i;break;}}}if(e>s){try{return JSON.parse(txt.slice(s,e+1));}catch{}}}
    return null;

          h("div",{style:{fontSize:11,fontWeight:500,textTransform:"uppercase",letterSpacing:"0.08em",color:"#854F0B",marginBottom:8}},"⚠ Pontos de atenção"),
